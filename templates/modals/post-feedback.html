<div 
    x-show="successModal || errorModal" 
    class="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-x-hidden overflow-y-auto"
    x-cloak
>
    <div 
        x-show="successModal || errorModal"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 bg-gray-900/60 backdrop-blur-sm"
        @click="successModal = false; errorModal = false"
    ></div>

    <div 
        x-show="successModal || errorModal"
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 scale-95 translate-y-4"
        x-transition:enter-end="opacity-100 scale-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 scale-100 translate-y-0"
        x-transition:leave-end="opacity-0 scale-95 translate-y-4"
        @post-results.window="
            if ($event.detail.status === 'success') {
                successModal = true; errorModal = false;
                modalMessage = 'Successfully created: ' + $event.detail.title;
            } else {
                errorModal = true; successModal = false;
                modalMessage = $event.detail.message;
            }
        "
        class="relative w-full max-w-sm overflow-hidden bg-white rounded-xl shadow-2xl"
    >
        <div :class="successModal ? 'bg-emerald-500' : 'bg-red-500'" 
             class="flex items-center justify-center py-6 text-white">
            
            <template x-if="successModal">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </template>
            
            <template x-if="errorModal">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </template>
        </div>

        <div class="p-6 text-center">
            <h3 class="text-xl font-bold text-gray-800" 
                x-text="successModal ? 'Success!' : 'Submission Failed'"></h3>
            <p class="mt-2 text-sm text-gray-500" x-text="modalMessage"></p>
        </div>

        <div class="px-6 pb-6">
            <button 
                @click="successModal = false; errorModal = false; window.location.reload()"
                class="w-full py-3 font-semibold text-white transition-colors rounded-lg shadow-md"
                :class="successModal ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-red-500 hover:bg-red-600'"
            >
                Continue
            </button>
        </div>
    </div>
</div>
