<div 
  x-show="editProfileForm" 
  class="fixed inset-0 z-50 flex justify-center items-start overflow-y-auto bg-gray-900/50 backdrop-blur-md"
  style="display: none;"
  x-cloak
>
  <div 
    x-on:click.away="editProfileForm = false"
    class="relative w-full max-w-[500px] mt-20 mb-6 bg-white rounded-xl shadow-2xl p-6 mx-4"
  >
    <form @submit.prevent="
    const formData = new FormData($el);
    const postData = Object.fromEntries(formData.entries());
    <!-- postData.user_id = 1; -->

    const token = getToken();
    if (!token){
        window.location.href='/login';
        return;
    }	

    try {
    const response = await fetch(`/api/users/${postId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify(postData)
        });

        if (response.ok) {
            const data = await response.json();
            editProfileForm = false; // Works perfectly here!
            window.dispatchEvent(new CustomEvent('post-results', { 
                detail: { status: 'success', title: data.title } 
            }));
        } else {
            const errorData = await response.json();
            window.dispatchEvent(new CustomEvent('post-results', { 
                detail: { status: 'error', message: errorData.detail || 'Error' } 
            }));
        }
    } catch (err) {
        window.dispatchEvent(new CustomEvent('post-results', { 
            detail: { status: 'error', message: 'Network error' } 
        }));
    }" id="createPostForm" class="w-full">
      <h2 class="text-xl font-bold mb-4">Update your profile</h2>
      
      <div class="flex flex-col gap-4">
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700">Username</label>
	  <input id="username" name="username" placeholder="Enter new username" class="p-2 border rounded-md focus:ring-2 focus:ring-black outline-none transition-all" value="" required/>
        </div>
        
        <div class="flex flex-col">
          <label class="text-sm font-medium text-gray-700">Email</label>

          <input id="email" name="email" placeholder="Enter new email" class="p-2 border rounded-md focus:ring-2 focus:ring-black outline-none transition-all" value="" required/>
        </div>

        <div class="border border-1 ">
            <label for="profile_image" >Choose a profile image:</label><br>
            <input type="file" id="profile_image" name="image_file" class="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-pink-50 file:text-pink-700 hover:file:bg-pink-100" name="profile_image"accept="image/*">
        </div>

        <div class="flex gap-3 justify-end mt-4">
          <button 
            @click="editProfileForm = false" 
            type="button" 
            class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition-colors"
          >
            Cancel
          </button>
          <button 
            type="submit" 
            class="px-6 py-2 bg-black text-white font-semibold rounded-lg hover:bg-neutral-800 transition-colors"
          >
            Update
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
