{% extends "layouts/blank.html" %}

{% block content %}
<div class="max-w-4xl mx-auto my-8 px-4"
     x-data="{ 
        user: null, 
        postId: {{ post.id }}, 
        postTitleToDelete: '{{ post.title | escape }}', 
        userId: {{ post.user_id }},
        editPostForm: false,
        deleteModal: false 
     }"
     x-init="user = window.getCurrentUser ? await getCurrentUser() : null; 
             window.addEventListener('auth-ready', async () => { user = await getCurrentUser(); });">

    <article class="flex flex-col rounded-2xl p-8 bg-white shadow-sm border border-neutral-100">
        
        <header class="mb-6">
            <h1 class="font-extrabold text-neutral-900 text-3xl md:text-4xl tracking-tight mb-3">
                {{ post.title }}
            </h1>
            
            <div class="flex items-center gap-3 text-sm">
                <a href="{{ url_for('user_posts', user_id=post.author.id) }}" 
                   class="font-medium text-blue-600 hover:bg-blue-50 px-2 py-1 rounded-md transition-colors">
                   @{{ post.author.username }}
                </a>
                <span class="text-neutral-300">•</span>
                <time class="text-neutral-500 font-medium">
                    {{ post.date_posted.strftime("%B %d, %Y") }}
                </time>
            </div>
        </header>

        <div class="prose prose-neutral max-w-none">
            <p class="text-lg text-neutral-700 leading-relaxed whitespace-pre-line">
                {{ post.content }}
            </p>
        </div>

        <template x-if="user && user.id === userId">
            <div class="flex items-center gap-3 mt-8 pt-6 border-t border-neutral-100">
                <button @click="editPostForm = true" 
                        class="inline-flex items-center px-6 py-2.5 bg-neutral-900 text-white text-sm font-bold rounded-xl hover:bg-neutral-700 transform active:scale-95 transition-all">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
                    Edit Post
                </button>
                
                <button @click="deleteModal = true" 
                        class="inline-flex items-center px-6 py-2.5 text-red-600 bg-red-50 text-sm font-bold rounded-xl hover:bg-red-100 transform active:scale-95 transition-all">
                    Delete
                </button>
            </div>
        </template>
    </article>

    {% include "modals/edit-post.html" %}
    {% include "modals/delete-modal.html" %}
</div>
{% endblock %}
