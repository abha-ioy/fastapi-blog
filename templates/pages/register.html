{% extends "layouts/login-register-layout.html" %}

{% block content %}
<div class="flex flex-col justify-center items-center py-12 w-full">
  
  <div class="w-full max-w-xl min-w-[300px] md:min-w-[500px] px-6">
    
    <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>

    <form class="w-full">
      <div class="flex flex-col gap-4 w-full">

        <div class="flex flex-col w-full">
          <label class="text-xs font-bold mb-1 tracking-wide">USERNAME</label>
          <input class="w-full min-w-full p-3 rounded-md border-2 border-gray-200 focus:border-black outline-none" 
                 placeholder="Username" id="username" name="username">
        </div>

        <div class="flex flex-col w-full">
          <label class="text-xs font-bold mb-1 tracking-wide">EMAIL</label>
          <input class="w-full min-w-full p-3 rounded-md border-2 border-gray-200 focus:border-black outline-none" 
                 type="email" placeholder="test@example.com" id="email" name="email">
        </div>

        <div class="flex flex-col w-full">
          <label class="text-xs font-bold mb-1 tracking-wide">PASSWORD</label>
          <input class="w-full min-w-full p-3 rounded-md border-2 border-gray-200 focus:border-black outline-none" 
                 type="password" placeholder="●●●●●●●" id="password" name="password">
        </div>

        <div class="w-full mt-4">
          <button class="w-full rounded-md bg-black text-white py-3 font-semibold hover:bg-gray-800 transition-colors" type="submit">
            Register
          </button>
        </div>

      </div>
    </form>

    <p class="text-sm text-center mt-6 text-gray-500">
      Already have an account? <a href="/login" class="underline text-black font-medium">Login</a>
    </p>

  </div>
</div>
{% endblock %}
