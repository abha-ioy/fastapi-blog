{% extends "layouts/login-register-layout.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-xl shadow-md border border-gray-100"
     x-data="{ user: null }"
     @auth-ready.window="user = await window.getCurrentUser()"
     x-init="if (window.getCurrentUser) user = await window.getCurrentUser()">
    
    <template x-if="!user">
        <div class="flex flex-col items-center animate-pulse">
            <div class="w-24 h-24 bg-gray-200 rounded-full"></div>
            <div class="h-4 bg-gray-200 rounded w-1/2 mt-4"></div>
            <div class="h-3 bg-gray-200 rounded w-1/3 mt-2"></div>
        </div>
    </template>

    <template x-if="user">
        <div class="flex flex-col items-center text-center">
            <div class="relative group">
                <div class="w-32 h-32 mb-4 rounded-full overflow-hidden border-4 border-indigo-50 shadow-sm transition-transform duration-300 group-hover:scale-105">
                    <img 
                        :src="user.image_path || 'https://ui-avatars.com/api/?name=' + user.username" 
                        class="w-full h-full object-cover"
                        alt="Profile avatar"
                    />
                </div>
            </div>

            <div class="space-y-1">
                <h2 class="text-2xl font-bold text-gray-800" x-text="user.username"></h2>
                <p class="text-sm font-medium text-indigo-600" x-text="user.email"></p>
            </div>

            <hr class="w-full my-6 border-gray-100">

            <div class="flex gap-3 w-full">
                <button @click="editProfileForm = !editProfileForm" class="flex-1 px-4 py-2 text-sm font-semibold text-white bg-indigo-600 rounded-lg hover:bg-indigo-700 transition-colors">
                    Edit Profile
                </button>
                <button 
                    @click="window.logout(); window.location.href='/login'"
                    class="flex-1 px-4 py-2 text-sm font-semibold text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors">
                    Log Out
                </button>
            </div>
        </div>
    </template>
    {% include "modals/edit-profile.html" %}
</div>
{% endblock %}
