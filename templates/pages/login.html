{% extends "layouts/login-register-layout.html" %}

{% block content %}
<div class="flex flex-col justify-center items-center py-12 w-full"> 
  
  <div class="w-full max-w-md min-w-[320px] md:min-w-[450px] px-6"> 
    
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    <form @submit.prevent="
		const formData = new FormData($el);

		try {
			const response = await fetch('/api/users/token', {
				method: 'POST',
				body: formData
			});

			if (response.ok) {
				const data = await response.json();
				localStorage.setItem('access_token', data.access_token);
				window.location.href='/';
			}
			else {
				const errorData = await response.json();
				console.log(errorData)
				window.dispatchEvent(new CustomEvent('post-results', {detail: {status: 'error', message: errorData.detail || 'Error'}}));
				
			}
		} catch (err) {

			window.dispatchEvent(new CustomEvent('post-results', {detail: {status: 'error', message: 'Network error'}}));
		}" class="w-full">
      <div class="w-full flex flex-col gap-5 items-stretch">

        <div class="flex flex-col w-full">
          <label class="text-xs font-bold mb-1 tracking-wide">USERNAME</label>
          <input class="w-full p-3 rounded-md border-2 border-gray-200 focus:border-black outline-none transition-colors" 
                 placeholder="Username" id="username" name="username">
        </div>

        <div class="flex flex-col w-full">
          <label class="text-xs font-bold mb-1 tracking-wide">PASSWORD</label>
          <input class="w-full p-3 rounded-md border-2 border-gray-200 focus:border-black outline-none transition-colors" 
                 placeholder="●●●●●●●●" id="password" name="password" type="password">
        </div>

        <div class="w-full mt-4">
          <input class="w-full rounded-md bg-black text-white py-3 font-semibold hover:bg-gray-800 transition-colors" type="submit" value="Login"/>
        </div>

      </div>
    </form>
    
    <p class="text-sm text-center mt-6 text-gray-500">
      Don't have an account? <a href="/register" class="underline text-black font-medium">Register</a>
    </p>
  </div>
</div>
{% endblock %}


{% block javascript %}

<script type="module">
    import { setToken, getCurrentUser } from "/static/js/auth.js";
    window.setToken = setToken;
    window.getCurrentUser = getCurrentUser;
</script>

{% endblock %}
