{% extends "layouts/login-register-layout.html" %}

{% block content %}
<div class="flex flex-col justify-center items-center py-12"> 
  
  <div class="w-full max-w-sm px-6"> 
    
    <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

    <form>
      <div class="w-full flex flex-col gap-5">

        <div class="flex flex-col w-full">
          <label class="text-xs font-bold mb-1 tracking-wide">USERNAME</label>
          <input class="w-full p-2.5 rounded-md border-2 border-gray-200 focus:border-black outline-none transition-colors" 
                 placeholder="Username" id="username" name="username">
        </div>

        <div class="flex flex-col w-full">
          <label class="text-xs font-bold mb-1 tracking-wide">PASSWORD</label>
          <input class="w-full p-2.5 rounded-md border-2 border-gray-200 focus:border-black outline-none transition-colors" 
                 placeholder="●●●●●●●" id="password" name="password" type="password">
        </div>

        <div class="w-full mt-4">
          <button class="w-full rounded-md bg-black text-white py-3 font-semibold hover:bg-gray-800 transition-colors" type="submit">
            Login
          </button>
        </div>

      </div>
    </form>
    
    <p class="text-sm text-center mt-6 text-gray-500">
      Don't have an account? <a href="/register" class="underline text-black">Register</a>
    </p>
  </div>
</div>
{% endblock %}
